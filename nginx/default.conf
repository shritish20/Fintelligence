# Rate limit zones
limit_req_zone $binary_remote_addr zone=login_limit:10m   rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m     rate=60r/m;
limit_req_zone $binary_remote_addr zone=analyse_limit:10m rate=6r/m;

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fintelligence.crt;
    ssl_certificate_key /etc/nginx/ssl/fintelligence.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── Landing page at / ─────────────────────────────────────────────────────
    location = / {
        root /etc/nginx/landing;
        try_files /index.html =404;
    }
    location = /privacy {
        root /etc/nginx/landing;
        try_files /privacy.html /index.html;
    }
    location = /terms {
        root /etc/nginx/landing;
        try_files /terms.html /index.html;
    }

    # ── React SPA at /app ─────────────────────────────────────────────────────
    location /app {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        rewrite ^/app(/.*)?$ /$1 break;
    }
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # ── React Assets (Fix for White Screen) ───────────────────────────────────
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Razorpay webhook — raw body preserved for HMAC ───────────────────────
    location /api/subscription/webhook {
        proxy_pass            http://fintelligence_volguard_backend:8000;
        proxy_http_version    1.1;
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    30s;
        proxy_connect_timeout 10s;
        proxy_request_buffering on;
    }

    # ── MF backend ───────────────────────────────────────────────────────────
    location ~ ^/api/mf/analyse {
        limit_req zone=analyse_limit burst=3 nodelay;
        limit_req_status 429;
        proxy_pass         http://fintelligence_mf_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
    }
    location /api/mf/ {
        proxy_pass         http://fintelligence_mf_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
    }

    # ── Equity backend ────────────────────────────────────────────────────────
    location ~ ^/api/equity/analyse {
        limit_req zone=analyse_limit burst=3 nodelay;
        limit_req_status 429;
        proxy_pass         http://fintelligence_equity_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
    }
    location /api/equity/ {
        proxy_pass         http://fintelligence_equity_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
        proxy_connect_timeout 10s;
    }

    # ── Tax backend ───────────────────────────────────────────────────────────
    location /api/tax/ {
        client_max_body_size 15m;
        proxy_pass         http://fintelligence_tax_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Auth — rate limited ───────────────────────────────────────────────────
    location ~ ^/api/auth/(login|register)$ {
        limit_req zone=login_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://fintelligence_volguard_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── Volguard — all remaining /api/ ────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass         http://fintelligence_volguard_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://fintelligence_volguard_backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    # ── Static file fallback ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}