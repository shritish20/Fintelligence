services:

  # ── PostgreSQL — single multi-tenant database ─────────────────────────────
  fintelligence_postgres:
    image: postgres:16-alpine
    container_name: fintelligence_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-fintelligence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB:       ${POSTGRES_DB:-fintelligence}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fintelligence} -d ${POSTGRES_DB:-fintelligence}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Redis — caching layer ─────────────────────────────────────────────────
  fintelligence_redis:
    image: redis:7-alpine
    container_name: fintelligence_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Volguard Backend (Options Intelligence) ───────────────────────────────
  fintelligence_volguard_backend:
    build:
      context: ./backend/volguard
      dockerfile: Dockerfile
    container_name: fintelligence_volguard_backend
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - volguard_logs:/app/logs
      - ./shared/auth_utils.py:/app/auth_utils.py:ro
      - ./shared/db_utils.py:/app/db_utils.py:ro
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-fintelligence}:${POSTGRES_PASSWORD}@fintelligence_postgres:5432/${POSTGRES_DB:-fintelligence}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@fintelligence_redis:6379/0
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is not set in .env file}
      - LOG_FILE=/app/logs/volguard.log
      - TZ=Asia/Kolkata
    depends_on:
      fintelligence_postgres:
        condition: service_healthy
      fintelligence_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "7"

  # ── MF Backend (Mutual Fund Intelligence) ────────────────────────────────
  fintelligence_mf_backend:
    build:
      context: ./backend/mf
      dockerfile: Dockerfile
    container_name: fintelligence_mf_backend
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - mf_logs:/app/logs
      - ./shared/auth_utils.py:/app/auth_utils.py:ro
      - ./shared/db_utils.py:/app/db_utils.py:ro
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-fintelligence}:${POSTGRES_PASSWORD}@fintelligence_postgres:5432/${POSTGRES_DB:-fintelligence}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@fintelligence_redis:6379/1
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is not set in .env file}
      - LOG_FILE=/app/logs/fintelligence_mf.log
      - TZ=Asia/Kolkata
    depends_on:
      fintelligence_postgres:
        condition: service_healthy
      fintelligence_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 50s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "7"

  # ── Equity Backend (Stock Intelligence) ──────────────────────────────────
  fintelligence_equity_backend:
    build:
      context: ./backend/equity
      dockerfile: Dockerfile
    container_name: fintelligence_equity_backend
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - equity_logs:/app/logs
      - ./shared/auth_utils.py:/app/auth_utils.py:ro
      - ./shared/db_utils.py:/app/db_utils.py:ro
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-fintelligence}:${POSTGRES_PASSWORD}@fintelligence_postgres:5432/${POSTGRES_DB:-fintelligence}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@fintelligence_redis:6379/2
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is not set in .env file}
      - LOG_FILE=/app/logs/fintelligence_equity.log
      - TZ=Asia/Kolkata
    depends_on:
      fintelligence_postgres:
        condition: service_healthy
      fintelligence_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "7"

  # ── Tax Backend (Taxation Intelligence) ──────────────────────────────────
  fintelligence_tax_backend:
    build:
      context: ./backend/tax
      dockerfile: Dockerfile
    container_name: fintelligence_tax_backend
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - tax_logs:/app/logs
      - ./shared/auth_utils.py:/app/auth_utils.py:ro
      - ./shared/db_utils.py:/app/db_utils.py:ro
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-fintelligence}:${POSTGRES_PASSWORD}@fintelligence_postgres:5432/${POSTGRES_DB:-fintelligence}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@fintelligence_redis:6379/3
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is not set in .env file}
      - LOG_FILE=/app/logs/fintelligence_tax.log
      - TZ=Asia/Kolkata
    depends_on:
      fintelligence_postgres:
        condition: service_healthy
      fintelligence_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "7"

  # ── Unified Frontend (React + Nginx) ─────────────────────────────────────
  fintelligence_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fintelligence_frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      fintelligence_volguard_backend:
        condition: service_healthy
      fintelligence_mf_backend:
        condition: service_healthy
      fintelligence_equity_backend:
        condition: service_healthy
      fintelligence_tax_backend:
        condition: service_healthy
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./landing:/etc/nginx/landing:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Volumes ───────────────────────────────────────────────────────────────────
# WARNING: `docker-compose down -v` DELETES all data.
# Always use `docker-compose down` (without -v) to stop safely.
volumes:
  postgres_data:
    driver: local
    labels:
      com.fintelligence.description: "PostgreSQL multi-tenant DB — DO NOT DELETE"
  redis_data:
    driver: local
  volguard_logs:
    driver: local
  mf_logs:
    driver: local
  equity_logs:
    driver: local
  tax_logs:
    driver: local